  # Gruvbox — retro warm earth tones. Signature gruvbox-yellow accent,
  # high contrast against the dark base.
  gruvbox:
    label:    "Gruvbox"
    accent:   "#fabd2f"
    palette:
      bg:           "#282828"
      surface:      "#3c3836"
      surface-2:    "#504945"
      border:       "#665c54"
