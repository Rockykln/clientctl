      thumb-track:  "#585b70"
      thumb-bg:     "#cdd6f4"
      inner-glow:   "rgba(203,166,247,0.08)"
      shadow:       "rgba(0,0,0,0.50)"
      toast-bg:     "rgba(30, 30, 46, 0.92)"
      toast-border: "rgba(203,166,247,0.18)"
    color-scheme: dark

  # Tokyo Night — popular dev theme. Deep navy base, periwinkle blue
