<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 770" font-family="system-ui, -apple-system, 'SF Pro Text', sans-serif">
  <!-- Mockup of the clientctl panel — illustrative, NOT a real screenshot.
       Mirrors the actual style.css palette and component proportions. -->

  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="120%">
      <stop offset="0%"  stop-color="#16161c"/>
      <stop offset="100%" stop-color="#0d0d10"/>
    </radialGradient>
    <linearGradient id="barOk"   x1="0" x2="1"><stop offset="0%" stop-color="#5a8dee"/><stop offset="100%" stop-color="#7aa6f5"/></linearGradient>
    <linearGradient id="barWarn" x1="0" x2="1"><stop offset="0%" stop-color="#f0c43a"/><stop offset="100%" stop-color="#f5d36a"/></linearGradient>
    <linearGradient id="cellActive" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d1d24"/>
      <stop offset="100%" stop-color="#181820"/>
    </linearGradient>
    <linearGradient id="iconBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1100" height="770" fill="url(#bg)"/>

  <!-- ───────────────── Header ───────────────── -->
  <g transform="translate(28,28)">
    <!-- Brand mark (bracket logo) -->
    <g transform="translate(0,12)">
      <g fill="none" stroke="#5a8dee" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 11 L7 16 L11 21"/>
        <path d="M21 11 L25 16 L21 21"/>
        <path d="M18 9 L14 23"/>
      </g>
    </g>
    <text x="36" y="34" font-size="20" font-weight="600" fill="#8a8a96" letter-spacing="0.5">clientctl</text>

    <!-- Ping pill (good) -->
    <g transform="translate(148,16)">
      <rect width="62" height="26" rx="13" fill="#1a1a20" stroke="rgba(90,238,141,0.4)"/>
      <text x="31" y="18" font-size="11" fill="#5aee8d" text-anchor="middle" font-variant-numeric="tabular-nums">14 ms</text>
    </g>

    <!-- Battery pill (charging) — matches the real UI:
         1px border at 0.4-alpha success, subtle text in success color,
         vertical bolt right of the percentage. No tinted background. -->
    <g transform="translate(222,15)">
      <rect width="86" height="28" rx="14" fill="transparent" stroke="rgba(90,238,141,0.4)" stroke-width="1"/>
      <!-- Outline battery icon -->
      <g transform="translate(11,7)" fill="none" stroke="#5aee8d" stroke-width="1.4">
        <rect x="0" y="2" width="11" height="14" rx="1.5"/>
        <rect x="3.5" y="0" width="4" height="2" fill="#5aee8d" stroke="none"/>
        <rect x="2" y="9" width="7" height="5" fill="#5aee8d" stroke="none"/>
      </g>
      <text x="42" y="19" font-size="11" font-weight="500" fill="#5aee8d" font-variant-numeric="tabular-nums">82%</text>
      <!-- Lightning bolt — small, in-line with text -->
      <g transform="translate(64,8)" fill="#5aee8d">
        <path d="M5.5 0 L1 7 L4 7 L2.5 12 L7 5 L4 5 Z"/>
      </g>
    </g>

    <!-- Right-aligned controls — simplified silhouettes -->
    <g transform="translate(1044,4)" text-anchor="end">
      <g id="ctrlBtn"></g>
      <!-- Lock -->
      <g transform="translate(-46,0)"><rect width="46" height="46" rx="14" fill="#1a1a20" stroke="#34343f"/>
        <g transform="translate(11,11)" fill="#f0f0f5"><path d="M12 2a5 5 0 00-5 5v3H6a2 2 0 00-2 2v9a2 2 0 002 2h12a2 2 0 002-2v-9a2 2 0 00-2-2h-1V7a5 5 0 00-5-5zm-3 8V7a3 3 0 116 0v3H9z"/></g>
      </g>
      <!-- Brightness -->
      <g transform="translate(-102,0)"><rect width="46" height="46" rx="14" fill="#1a1a20" stroke="#34343f"/>
        <g transform="translate(11,11)" fill="#f0f0f5"><circle cx="12" cy="12" r="4"/><g stroke="#f0f0f5" stroke-width="1.6"><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="4" y1="12" x2="2" y2="12"/><line x1="22" y1="12" x2="20" y2="12"/><line x1="5.5" y1="5.5" x2="7.5" y2="7.5"/><line x1="16.5" y1="16.5" x2="18.5" y2="18.5"/><line x1="5.5" y1="18.5" x2="7.5" y2="16.5"/><line x1="16.5" y1="7.5" x2="18.5" y2="5.5"/></g></g>
      </g>
      <!-- Volume -->
      <g transform="translate(-158,0)"><rect width="46" height="46" rx="14" fill="#1a1a20" stroke="#34343f"/>
        <g transform="translate(11,11)" fill="#f0f0f5"><path d="M3 10v4a1 1 0 001 1h3l4 4V5L7 9H4a1 1 0 00-1 1zm13 2a4 4 0 00-2-3.46v6.92A4 4 0 0016 12zm-2-7v2.07A6 6 0 0118 12a6 6 0 01-4 5.66v2.07A8 8 0 0014 5z"/></g>
      </g>
      <line x1="-176" y1="9" x2="-176" y2="37" stroke="#34343f"/>
      <!-- Logout -->
      <g transform="translate(-230,0)"><rect width="46" height="46" rx="14" fill="#1a1a20" stroke="#34343f"/>
        <g transform="translate(11,11)" fill="#f0f0f5"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4a2 2 0 00-2 2v14a2 2 0 002 2h8v-2H4z"/></g>
      </g>
      <!-- Settings -->
      <g transform="translate(-286,0)"><rect width="46" height="46" rx="14" fill="#1a1a20" stroke="#34343f"/>
        <g transform="translate(11,11)" fill="#f0f0f5"><circle cx="12" cy="12" r="3"/><path d="M19.4 13a7.5 7.5 0 000-2l2-1.5-2-3.4-2.4 1A7.4 7.4 0 0015 5.5L14.6 3h-5.2L9 5.5a7.4 7.4 0 00-2 1.1l-2.4-1-2 3.4L4.6 11a7.5 7.5 0 000 2l-2 1.5 2 3.4 2.4-1c.6.5 1.3.9 2 1.1l.4 2.5h5.2l.4-2.5c.7-.2 1.4-.6 2-1.1l2.4 1 2-3.4z" fill="none" stroke="#f0f0f5" stroke-width="1"/></g>
      </g>
      <!-- Stop server -->
      <g transform="translate(-342,0)"><rect width="46" height="46" rx="14" fill="#1a1a20" stroke="#34343f"/><rect x="17" y="17" width="12" height="12" fill="#8a8a96"/></g>
      <!-- Shutdown -->
      <g transform="translate(-398,0)"><rect width="46" height="46" rx="14" fill="#1a1a20" stroke="#34343f"/>
        <g transform="translate(11,11)" fill="#ee5a5a"><path d="M13 3h-2v10h2zm4.83 2.17-1.42 1.42A6.93 6.93 0 0 1 19 12a7 7 0 1 1-12-4.92L5.59 5.66A8.95 8.95 0 0 0 3 12a9 9 0 0 0 18 0c0-2.74-1.23-5.18-3.17-6.83z"/></g>
      </g>
      <!-- Power profile -->
      <g transform="translate(-454,0)"><rect width="46" height="46" rx="14" fill="#1a1a20" stroke="#34343f"/>
        <g transform="translate(11,11)" fill="#f0f0f5"><path d="M20.4 8.6l-1.2 1.8a8 8 0 01-.2 7.6H5A8 8 0 0115.6 6.9l1.8-1.2A10 10 0 003.4 19a2 2 0 001.7 1H19a2 2 0 001.7-1 10 10 0 00-.3-10.4zm-9.8 6.8a2 2 0 002.8 0l5.7-8.5-8.5 5.7a2 2 0 000 2.8z"/></g>
      </g>
      <!-- Notifications -->
      <g transform="translate(-510,0)"><rect width="46" height="46" rx="14" fill="#1a1a20" stroke="#34343f"/>
        <g transform="translate(11,11)" fill="#f0f0f5"><path d="M12 22a2 2 0 002-2h-4a2 2 0 002 2zm6-6V11a6 6 0 00-5-5.91V4a1 1 0 10-2 0v1.09A6 6 0 006 11v5l-2 2v1h16v-1l-2-2z"/></g>
      </g>
    </g>
  </g>

  <!-- ───────────────── Stats row ───────────────── -->
  <g transform="translate(28,96)">
    <!-- 4 narrow + 1 wide -->
    <g transform="translate(0,0)">
      <rect width="180" height="44" rx="12" fill="#1a1a20" stroke="#34343f"/>
      <text x="12" y="18" font-size="9" font-weight="700" fill="#8a8a96" letter-spacing="0.6">CPU</text>
      <text x="168" y="18" font-size="12" font-weight="600" fill="#f0f0f5" text-anchor="end" font-variant-numeric="tabular-nums">38%</text>
      <rect x="12" y="28" width="156" height="4" rx="2" fill="rgba(255,255,255,0.06)"/>
      <rect x="12" y="28" width="59"  height="4" rx="2" fill="url(#barOk)"/>
    </g>
    <g transform="translate(190,0)">
      <rect width="180" height="44" rx="12" fill="#1a1a20" stroke="#34343f"/>
      <text x="12" y="18" font-size="9" font-weight="700" fill="#8a8a96" letter-spacing="0.6">RAM</text>
      <text x="168" y="18" font-size="12" font-weight="600" fill="#f0c43a" text-anchor="end" font-variant-numeric="tabular-nums">74%</text>
      <rect x="12" y="28" width="156" height="4" rx="2" fill="rgba(255,255,255,0.06)"/>
      <rect x="12" y="28" width="115" height="4" rx="2" fill="url(#barWarn)"/>
    </g>
    <g transform="translate(380,0)">
      <rect width="180" height="44" rx="12" fill="#1a1a20" stroke="#34343f"/>
      <text x="12" y="18" font-size="9" font-weight="700" fill="#8a8a96" letter-spacing="0.6">GPU</text>
      <text x="168" y="18" font-size="12" font-weight="600" fill="#f0f0f5" text-anchor="end" font-variant-numeric="tabular-nums">12%</text>
      <rect x="12" y="28" width="156" height="4" rx="2" fill="rgba(255,255,255,0.06)"/>
      <rect x="12" y="28" width="19"  height="4" rx="2" fill="url(#barOk)"/>
    </g>
    <g transform="translate(570,0)">
      <rect width="180" height="44" rx="12" fill="#1a1a20" stroke="#34343f"/>
      <text x="12" y="27" font-size="9" font-weight="700" fill="#8a8a96" letter-spacing="0.6">PROC</text>
      <text x="168" y="27" font-size="14" font-weight="600" fill="#f0f0f5" text-anchor="end" font-variant-numeric="tabular-nums">487</text>
    </g>
    <g transform="translate(760,0)">
      <rect width="284" height="44" rx="12" fill="#1a1a20" stroke="#34343f"/>
      <text x="12" y="27" font-size="9" font-weight="700" fill="#8a8a96" letter-spacing="0.6">NET</text>
      <text x="272" y="27" font-size="11" font-weight="500" fill="#f0f0f5" text-anchor="end" font-variant-numeric="tabular-nums">↓ 2.4 MB/s   ↑ 116 KB/s</text>
    </g>
  </g>

  <!-- ───────────────── Grid 4×3 ───────────────── -->
  <!-- Each cell: 252×170, gap 12, starts at x=28 y=170 -->
  <g transform="translate(28,170)">

    <!-- ROW 1 -->

    <!-- Files (active = green border) -->
    <g transform="translate(0,0)" filter="url(#softShadow)">
      <rect width="252" height="170" rx="16" fill="url(#cellActive)" stroke="#5aee8d"/>
      <g transform="translate(96,30)">
        <rect width="60" height="60" rx="14" fill="url(#iconBg)"/>
        <g transform="translate(15,18)" fill="none" stroke="#cad1f5" stroke-width="2" stroke-linejoin="round">
          <path d="M2 3v18h26V7h-12l-3-4H2z"/>
        </g>
      </g>
      <text x="126" y="124" font-size="12" font-weight="500" fill="#cad1f5" text-anchor="middle">Files</text>
    </g>

    <!-- Terminal (active) -->
    <g transform="translate(264,0)" filter="url(#softShadow)">
      <rect width="252" height="170" rx="16" fill="url(#cellActive)" stroke="#5aee8d"/>
      <g transform="translate(96,30)">
        <rect width="60" height="60" rx="14" fill="url(#iconBg)"/>
        <g transform="translate(13,18)" fill="none" stroke="#cad1f5" stroke-width="2" stroke-linejoin="round">
          <rect x="2" y="2" width="30" height="22" rx="2"/>
          <polyline points="8,10 14,14 8,18"/>
          <line x1="17" y1="18" x2="25" y2="18"/>
        </g>
      </g>
      <text x="126" y="124" font-size="12" font-weight="500" fill="#cad1f5" text-anchor="middle">Terminal</text>
    </g>

    <!-- Editor (background = grey border) -->
    <g transform="translate(528,0)" filter="url(#softShadow)">
      <rect width="252" height="170" rx="16" fill="#1a1a20" stroke="#8a8a96"/>
      <g transform="translate(96,30)">
        <rect width="60" height="60" rx="14" fill="url(#iconBg)"/>
        <g transform="translate(15,15)" fill="none" stroke="#aaaab2" stroke-width="2" stroke-linejoin="round">
          <path d="M5 2h16v26H5z"/>
          <line x1="9" y1="8"  x2="17" y2="8"/>
          <line x1="9" y1="14" x2="17" y2="14"/>
          <line x1="9" y1="20" x2="14" y2="20"/>
        </g>
      </g>
      <text x="126" y="124" font-size="12" font-weight="500" fill="#8a8a96" text-anchor="middle">Editor</text>
    </g>

    <!-- Browser (off = default border) -->
    <g transform="translate(792,0)" filter="url(#softShadow)">
      <rect width="252" height="170" rx="16" fill="#1a1a20" stroke="#34343f"/>
      <g transform="translate(96,30)">
        <rect width="60" height="60" rx="14" fill="url(#iconBg)"/>
        <g transform="translate(14,14)" fill="none" stroke="#8a8a96" stroke-width="2">
          <circle cx="16" cy="16" r="14"/>
          <ellipse cx="16" cy="16" rx="6" ry="14"/>
          <line x1="2" y1="16" x2="30" y2="16"/>
        </g>
      </g>
      <text x="126" y="124" font-size="12" font-weight="500" fill="#8a8a96" text-anchor="middle">Browser</text>
    </g>

    <!-- ROW 2 -->

    <!-- Music (paused = yellow) -->
    <g transform="translate(0,182)" filter="url(#softShadow)">
      <rect width="252" height="170" rx="16" fill="#1a1a20" stroke="#f0c43a"/>
      <g transform="translate(96,30)">
        <rect width="60" height="60" rx="14" fill="url(#iconBg)"/>
        <g transform="translate(15,15)" fill="none" stroke="#cdb058" stroke-width="2" stroke-linejoin="round">
          <path d="M22 4v16"/>
          <path d="M22 4l-12 3v15"/>
          <circle cx="8"  cy="22" r="3" fill="#cdb058"/>
          <circle cx="20" cy="20" r="3" fill="#cdb058"/>
        </g>
      </g>
      <text x="126" y="124" font-size="12" font-weight="500" fill="#cdb058" text-anchor="middle">Music</text>
      <circle cx="232" cy="20" r="3" fill="#f0c43a"/>
    </g>

    <!-- System Monitor (active) -->
    <g transform="translate(264,182)" filter="url(#softShadow)">
      <rect width="252" height="170" rx="16" fill="url(#cellActive)" stroke="#5aee8d"/>
      <g transform="translate(96,30)">
        <rect width="60" height="60" rx="14" fill="url(#iconBg)"/>
        <g transform="translate(13,15)" fill="none" stroke="#cad1f5" stroke-width="2" stroke-linejoin="round">
          <rect x="2" y="2" width="30" height="26" rx="2"/>
          <polyline points="6,22 12,16 18,20 26,8"/>
        </g>
      </g>
      <text x="126" y="124" font-size="12" font-weight="500" fill="#cad1f5" text-anchor="middle">System Monitor</text>
    </g>

    <!-- Audio (off) -->
    <g transform="translate(528,182)" filter="url(#softShadow)">
      <rect width="252" height="170" rx="16" fill="#1a1a20" stroke="#34343f"/>
      <g transform="translate(96,30)">
        <rect width="60" height="60" rx="14" fill="url(#iconBg)"/>
        <g transform="translate(15,15)" fill="none" stroke="#8a8a96" stroke-width="2" stroke-linejoin="round">
          <path d="M4 12v8a1 1 0 001 1h4l8 7V4l-8 7H5a1 1 0 00-1 1z"/>
          <path d="M22 11a4 4 0 010 10"/>
          <path d="M25 7a8 8 0 010 18"/>
        </g>
      </g>
      <text x="126" y="124" font-size="12" font-weight="500" fill="#8a8a96" text-anchor="middle">Audio</text>
    </g>

    <!-- Games (off) — clean pill-shaped gamepad -->
    <g transform="translate(792,182)" filter="url(#softShadow)">
      <rect width="252" height="170" rx="16" fill="#1a1a20" stroke="#34343f"/>
      <g transform="translate(96,30)">
        <rect width="60" height="60" rx="14" fill="url(#iconBg)"/>
        <g transform="translate(11,19)" fill="none" stroke="#8a8a96"
           stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
          <rect x="2" y="2" width="34" height="20" rx="10"/>
          <line x1="8"  y1="12" x2="14" y2="12"/>
          <line x1="11" y1="9"  x2="11" y2="15"/>
          <circle cx="26" cy="9"  r="1.6" fill="#8a8a96"/>
          <circle cx="30" cy="15" r="1.6" fill="#8a8a96"/>
        </g>
      </g>
      <text x="126" y="124" font-size="12" font-weight="500" fill="#8a8a96" text-anchor="middle">Games</text>
    </g>

    <!-- ROW 3 -->

    <!-- Chat (off) -->
    <g transform="translate(0,364)" filter="url(#softShadow)">
      <rect width="252" height="170" rx="16" fill="#1a1a20" stroke="#34343f"/>
      <g transform="translate(96,30)">
        <rect width="60" height="60" rx="14" fill="url(#iconBg)"/>
        <g transform="translate(13,15)" fill="none" stroke="#8a8a96" stroke-width="2" stroke-linejoin="round">
          <path d="M3 6a3 3 0 013-3h20a3 3 0 013 3v14a3 3 0 01-3 3h-9l-7 6v-6H6a3 3 0 01-3-3z"/>
        </g>
      </g>
      <text x="126" y="124" font-size="12" font-weight="500" fill="#8a8a96" text-anchor="middle">Chat</text>
    </g>

    <!-- Notes (active) -->
    <g transform="translate(264,364)" filter="url(#softShadow)">
      <rect width="252" height="170" rx="16" fill="url(#cellActive)" stroke="#5aee8d"/>
      <g transform="translate(96,30)">
        <rect width="60" height="60" rx="14" fill="url(#iconBg)"/>
        <g transform="translate(15,15)" fill="none" stroke="#cad1f5" stroke-width="2" stroke-linejoin="round">
          <path d="M5 2v26h22V8l-6-6z"/>
          <path d="M21 2v6h6"/>
          <line x1="10" y1="14" x2="22" y2="14"/>
          <line x1="10" y1="20" x2="22" y2="20"/>
        </g>
      </g>
      <text x="126" y="124" font-size="12" font-weight="500" fill="#cad1f5" text-anchor="middle">Notes</text>
    </g>

    <!-- Mail (off) -->
    <g transform="translate(528,364)" filter="url(#softShadow)">
      <rect width="252" height="170" rx="16" fill="#1a1a20" stroke="#34343f"/>
      <g transform="translate(96,30)">
        <rect width="60" height="60" rx="14" fill="url(#iconBg)"/>
        <g transform="translate(13,18)" fill="none" stroke="#8a8a96" stroke-width="2" stroke-linejoin="round">
          <rect x="2" y="2" width="30" height="22" rx="3"/>
          <polyline points="2,5 17,16 32,5"/>
        </g>
      </g>
      <text x="126" y="124" font-size="12" font-weight="500" fill="#8a8a96" text-anchor="middle">Mail</text>
    </g>

    <!-- System Updates (accent — updates available) -->
    <g transform="translate(792,364)" filter="url(#softShadow)">
      <rect width="252" height="170" rx="16" fill="#1a1a20" stroke="#5a8dee"/>
      <rect width="252" height="170" rx="16" fill="rgba(90,141,238,0.10)"/>
      <g transform="translate(96,30)">
        <rect width="60" height="60" rx="14" fill="url(#iconBg)"/>
        <g transform="translate(13,14)" fill="none" stroke="#5a8dee" stroke-width="2" stroke-linejoin="round">
          <path d="M17 2L2 9v14l15 7 15-7V9z"/>
          <polyline points="2,9 17,16 32,9"/>
          <line x1="17" y1="16" x2="17" y2="30"/>
        </g>
      </g>
      <text x="126" y="124" font-size="12" font-weight="500" fill="#5a8dee" text-anchor="middle">System Updates</text>
    </g>

  </g>

  <!-- ───────────────── Footer (bottom-right) ───────────────── -->
  <!-- Real GitHub Octocat path (same path as in static/index.html) +
       version pill. Right-anchored so it sits cleanly in the corner. -->
  <g transform="translate(1074,738)" opacity="0.7">
    <!-- GitHub Octocat mark (14×14, scaled from 24-grid) -->
    <g transform="translate(-72,2) scale(0.6)">
      <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.547-1.385-1.336-1.755-1.336-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12" fill="#8a8a96"/>
    </g>
    <!-- Version pill (right-anchored). Border made slightly lighter than
         the original #34343f so it's actually visible against the dark
         pill body. Matches the real .app-version border perception. -->
    <g transform="translate(-54,-2)">
      <rect width="54" height="24" rx="12" fill="#1a1a20"
            stroke="#3d3d4a" stroke-width="1"/>
