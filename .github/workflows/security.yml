name: security

# Defense-in-depth scanners on top of CodeQL + Dependabot:
#   - bandit     : Python-specific SAST (catches idioms CodeQL sometimes misses)
#   - pip-audit  : OSV-backed dependency CVE scan (overlaps with Dependabot but
#                  uses a different advisory database)
#   - trufflehog : verified-secret detection across the full git history

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Weekly run picks up newly disclosed advisories even without code changes
    - cron: "31 5 * * 1"

permissions:
  contents: read
  security-events: write   # required for SARIF / Code-Scanning uploads

jobs:

  bandit:
    name: bandit (python SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit (medium + high severity only)
        # Config (skips, exclude_dirs) lives in pyproject.toml [tool.bandit].
        # -ll = report only Medium and High severity issues; lows are noise here.
        run: bandit -c pyproject.toml -r config.py server.py core routes utils -ll

  pip-audit:
    name: pip-audit (dependency CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime + audit tool
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Run pip-audit
        # --strict makes the job fail on any known vulnerability in the
        # installed dependency tree (including transitive deps).
        run: pip-audit --strict

  trufflehog:
    name: trufflehog (secret detection)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so the action can scan every commit, not just HEAD.
          fetch-depth: 0

      - name: Run TruffleHog
        # SHA-pinned (not @main, not @v3) — TruffleHog has full access to
        # the repo's git history while running, which is exactly the kind
        # of third-party action GitHub recommends pinning by commit SHA.
        # Bumped via Dependabot's github-actions ecosystem.
        uses: trufflesecurity/trufflehog@17456f8c7d042d8c82c9a8ca9e937231f9f42e26  # v3.95.2
        with:
          # --only-verified: a "secret" is only flagged when TruffleHog
          # successfully validates it against the actual service (e.g. a
          # GitHub token must be accepted by api.github.com). Drops the
          # false-positive rate dramatically.
          extra_args: --only-verified
