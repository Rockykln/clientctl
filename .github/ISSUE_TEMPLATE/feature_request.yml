name: Feature request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        clientctl aims to stay focused: a remote control panel for a single
        Linux client. Features that fit that scope are very welcome.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today, or what's awkward?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? UI sketches and API shapes welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about + why you didn't pick them.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Backend (Python — new endpoint, capability, etc.)
        - Frontend (UI / touch ergonomics)
        - Configuration (apps.yml, .env)
        - Documentation
        - Something else
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues before opening this one.
          required: true
        - label: I'm willing to discuss design tradeoffs (this is not a "fire and forget").
          required: false
